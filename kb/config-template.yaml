# Agentic Local Brain 配置文件
# 支持环境变量替换，格式: ${VAR_NAME}

# 数据目录路径
data_dir: ~/.knowledge-base

# Update server URL (for self-update functionality)
update_server_url: http://localbrain.oss-cn-shanghai.aliyuncs.com

# 嵌入模型配置（通过 LiteLLM 统一调用）
#
# model 格式为 "provider/model"，详见 https://docs.litellm.ai/docs/embedding/supported_embedding
#
# ─── 配置示例 ───
#
# DashScope（阿里云百炼）：
# embedding:
#   provider: litellm
#   model: openai/text-embedding-v4
#   api_key: ${DASHSCOPE_API_KEY}
#   base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#   encoding_format: float
#
# OpenAI 官方：
# embedding:
#   provider: litellm
#   model: openai/text-embedding-3-small
#   api_key: ${OPENAI_API_KEY}
#
# 本地服务（如 Ollama）：
# embedding:
#   provider: litellm
#   model: ollama/nomic-embed-text  # 使用 ollama/ 前缀（推荐）
#   api_key: not-needed
#   base_url: http://localhost:11434
#   # 注意：ollama 不支持 encoding_format 参数，请勿设置
#
embedding:
  provider: litellm
  model: openai/text-embedding-v4
  api_key: ${DASHSCOPE_API_KEY}
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  encoding_format: float

# 大语言模型配置（通过 LiteLLM 统一调用）
#
# model 格式为 "provider/model"，详见 https://docs.litellm.ai/docs/providers
#
# ─── 配置示例 ───
#
# DashScope（阿里云百炼）：
# llm:
#   provider: litellm
#   model: dashscope/qwen-plus
#   api_key: ${DASHSCOPE_API_KEY}
#
# OpenAI：
# llm:
#   provider: litellm
#   model: openai/gpt-4o
#   api_key: ${OPENAI_API_KEY}
#
# Anthropic Claude：
# llm:
#   provider: litellm
#   model: anthropic/claude-3-5-sonnet-20241022
#   api_key: ${ANTHROPIC_API_KEY}
#
# 本地服务（如 Ollama）：
# llm:
#   provider: litellm
#   model: openai/qwen2.5:7b
#   api_key: ollama
#   base_url: http://localhost:11434/v1
#
llm:
  provider: litellm
  model: dashscope/qwen-plus
  api_key: ${DASHSCOPE_API_KEY}

# 文本分块配置
chunking:
  max_chunk_size: 1000
  chunk_overlap: 100

# 存储配置
storage:
  type: chroma
  persist_directory: ~/.knowledge-base/db/chroma

# 查询配置
query:
  # RAG 查询配置
  rag:
    top_k: 5                    # RAG 检索的文档数量
    temperature: 0.3             # LLM 生成温度
    max_tokens: 1000             # LLM 最大 token 数
    context_budget: 4000         # LLM 上下文 token 预算
    context_format: hierarchical # 上下文格式: hierarchical (分层) 或 flat (扁平)
    # 重排序配置（使用 LLM 对检索结果进行相关性评分）
    reranking:
      enabled: true              # 是否启用 LLM 重排序
      top_n_candidates: 20       # 参与重排序的候选文档数量
      weight_retrieval: 0.4      # 检索分数权重
      weight_rerank: 0.6         # 重排序分数权重
    # 多轮对话配置
    conversation:
      max_turns: 20              # 单个会话最大轮数
      session_timeout_minutes: 30  # 会话超时时间（分钟）
      history_turns_in_context: 5  # 注入上下文的最近轮数
    # 提示词模板配置
    templates:
      default: general           # 默认模板: general, technical, academic, creative
      # 自定义模板示例 (取消注释以启用):
      # custom: |
      #   You are a specialized assistant for {domain}.
      #   {context}
      #   Question: {question}
  # 检索流水线配置
  pipeline:
    top_k: 10                    # 检索阶段返回的文档数量
    rerank_top_k: 5              # 重排序后返回的文档数量
    context_budget: 4000         # LLM 上下文 token 预算（备用）

# Logging configuration (used for background web server mode)
logging:
  log_dir: ""              # Log directory (default: ~/.localbrain/logs/)
  level: INFO              # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  max_bytes: 10485760      # Max log file size in bytes (default: 10MB)
  backup_count: 5          # Number of rotated backup files to keep
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Wiki compilation settings
wiki:
  enabled: true                        # Enable wiki article generation during mining
  max_source_tokens_per_topic: 8000    # Max tokens from source docs per topic
  entity_card_threshold: 3             # Min topic appearances for entity cards
  temperature: 0.3                     # LLM temperature for compilation
  model: null                          # null = use default LLM model
  max_article_words: 3000              # Target max words per article
  max_subcategories: 5                 # Max subcategories per topic

# Backup settings
backup:
  enabled: false                       # Enable automatic backups
  schedule: "0 2 * * *"                # Cron schedule (default: daily at 2 AM)
  retention_days: 30                   # Number of days to keep backups
  backup_dir: ~/.knowledge-base/backups  # Backup directory
  include_db: true                     # Include database in backups
  include_files: true                  # Include collected files in backups
  compression: true                    # Compress backup archives

  # Cloud storage provider: oss (Alibaba Cloud OSS) or s3 (AWS S3)
  cloud_provider: oss

  # Alibaba Cloud OSS configuration
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access_key_id: ${OSS_ACCESS_KEY_ID}
    access_key_secret: ${OSS_ACCESS_KEY_SECRET}
    bucket: localbrain-backups

  # AWS S3 configuration
  s3:
    region: us-west-2
    access_key_id: ${AWS_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    bucket: localbrain-backups
